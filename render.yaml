# Blueprint de deploy para o Render (https://render.com)
# Cria um Web Service Node a partir deste repositório.
# As variáveis marcadas como sync:false devem ser preenchidas no painel do Render.
services:
  - type: web
    name: ormed-backend
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run build
    # O admin é criado automaticamente no arranque (AdminSeederService)
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SEED_ADMIN_NAME
        sync: false
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
